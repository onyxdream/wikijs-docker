services:
  psql:
    image: postgres:16.11-alpine3.22
    profiles: ["localdb"]
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pg_volume:/var/lib/postgresql/data:rw
    networks:
      - app_network
    restart: unless-stopped

  wikijs:
    image: ghcr.io/requarks/wiki:2.5
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    networks:
      - app_network
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - app_network

  ldap:
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    profiles: ["ldap"]
    environment:
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ORGANISATION: ${ORGANIZATION}
      LDAP_DOMAIN: ${DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_TLS: "false"
    volumes:
      - ../ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-bootstrap.ldif
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    ports:
      - "389:389"
    networks:
      - app_network
    command: --copy-service

volumes:
  pg_volume:
    name: pg_volume
    driver: local
  ldap_data:
    driver: local
  ldap_config:
    driver: local

networks:
  app_network:
    name: app_network
    driver: bridge
