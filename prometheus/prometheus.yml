global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
  - job_name: "postgres_exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-prometheus-exporter:9113"]
